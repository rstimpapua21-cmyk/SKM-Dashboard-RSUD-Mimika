<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SKM RSUD Mimika</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#6366f1;--pl:#818cf8;--a:#f59e0b;--s:#10b981;--d:#ef4444;--bd:#0f172a;--bc:#1e293b;--bh:#334155;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--br:#334155;--g1:linear-gradient(135deg,#6366f1,#8b5cf6);--g2:linear-gradient(135deg,#f59e0b,#ef4444);--g3:linear-gradient(135deg,#10b981,#06b6d4);--g4:linear-gradient(135deg,#3b82f6,#6366f1)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bd);color:var(--t1);min-height:100vh;overflow-x:hidden}
        .bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,.08)0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.06)0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(16,185,129,.05)0%,transparent 50%),var(--bd)}
        .hdr{background:rgba(30,41,59,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);padding:16px 24px;position:sticky;top:0;z-index:100}
        .hdr-i{max-width:1400px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
        .hdr-t{display:flex;align-items:center;gap:12px}.hdr-ic{width:40px;height:40px;border-radius:10px;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:20px;color:white}
        .hdr-h h1{font-size:18px;font-weight:700}.hdr-h p{font-size:12px;color:var(--t2);margin-top:2px}
        .syn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)}.dot{width:8px;height:8px;border-radius:50%;background:var(--s);animation:p 2s infinite}.dot.off{background:var(--d);animation:none}.dot.ld{background:var(--a);animation:p .8s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
        .btn{background:var(--g1);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform .15s}.btn:hover{transform:scale(1.05)}
        .mn{max-width:1400px;margin:0 auto;padding:24px}
        .kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
        .kc{background:var(--bc);border-radius:16px;padding:20px;border:1px solid var(--br);position:relative;overflow:hidden;transition:transform .2s}.kc:hover{transform:translateY(-2px)}
        .kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}.kc:nth-child(1)::before{background:var(--g1)}.kc:nth-child(2)::before{background:var(--g2)}.kc:nth-child(3)::before{background:var(--g3)}.kc:nth-child(4)::before{background:var(--g4)}.kc:nth-child(5)::before{background:var(--g1)}
        .ki{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
        .kc:nth-child(1) .ki{background:rgba(99,102,241,.15);color:var(--pl)}.kc:nth-child(2) .ki{background:rgba(245,158,11,.15);color:var(--a)}.kc:nth-child(3) .ki{background:rgba(16,185,129,.15);color:var(--s)}.kc:nth-child(4) .ki{background:rgba(59,130,246,.15);color:#3b82f6}.kc:nth-child(5) .ki{background:rgba(139,92,246,.15);color:#8b5cf6}
        .kl{font-size:12px;color:var(--t2);margin-bottom:6px}.kv{font-size:28px;font-weight:700}.ks{font-size:11px;color:var(--t3);margin-top:4px}
        .cg{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
        .cc{background:var(--bc);border-radius:16px;padding:20px;border:1px solid var(--br);transition:transform .2s}.cc:hover{transform:translateY(-2px)}
        .cc h3{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}.cc h3 i{color:var(--pl)}
        .cw{position:relative;width:100%}.cf{grid-column:1/-1}
        .ts{background:var(--bc);border-radius:16px;padding:20px;border:1px solid var(--br);margin-bottom:24px}
        .ts h3{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .dt{width:100%;border-collapse:collapse;font-size:13px}.dt th{background:rgba(99,102,241,.1);padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid var(--p);white-space:nowrap}
        .dt td{padding:8px 12px;border-bottom:1px solid var(--br)}.dt tr:hover td{background:var(--bh)}.dt .n{text-align:center;font-weight:600}
        .qb{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700}.qA{background:rgba(16,185,129,.2);color:#10b981}.qB{background:rgba(59,130,246,.2);color:#3b82f6}.qC{background:rgba(245,158,11,.2);color:#f59e0b}.qD{background:rgba(239,68,68,.2);color:#ef4444}
        .lo{position:fixed;inset:0;z-index:9999;background:var(--bd);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .3s}.lo.h{opacity:0;pointer-events:none}
        .ld{width:48px;height:48px;border-radius:50%;border:3px solid var(--br);border-top-color:var(--p);animation:sp .8s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
        .lt{font-size:14px;color:var(--t2)}
        .es{text-align:center;padding:60px 24px}.es i{font-size:48px;color:var(--d);margin-bottom:16px}.es h3{font-size:18px;margin-bottom:8px}.es p{font-size:13px;color:var(--t2);margin-bottom:16px}
        .fb{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}.fb select{background:var(--bc);border:1px solid var(--br);color:var(--t1);padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer}.fb select:focus{border-color:var(--p);outline:none}
        .fl{font-size:12px;color:var(--t2)}
        .ft{text-align:center;padding:16px;font-size:12px;color:var(--t3);border-top:1px solid var(--br)}
        @media(max-width:768px){.cg{grid-template-columns:1fr}.kr{grid-template-columns:repeat(2,1fr)}.mn{padding:16px}.hdr-i{flex-wrap:wrap}}@media(max-width:480px){.kr{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="lo" id="lo"><div class="ld"></div><div class="lt" id="lt">Memuat data SKM dari Google Sheets...</div></div>
<div class="hdr"><div class="hdr-i"><div class="hdr-t"><div class="hdr-ic"><i class="fas fa-hospital"></i></div><div class="hdr-h"><h1>Dashboard SKM RSUD Mimika</h1><p>Survey Kepuasan Masyarakat — Real-time Sync</p></div></div><div style="display:flex;align-items:center;gap:16px"><div class="syn"><div class="dot ld" id="dot"></div><span id="stxt">Menyinkronkan...</span></div><button class="btn" onclick="refresh()"><i class="fas fa-sync-alt" id="ric"></i> Refresh</button></div></div></div>
<div class="mn" id="mc" style="display:none"><div class="kr" id="kr"></div><div class="fb" id="fb"></div><div class="cg" id="cg"></div><div class="ts"><h3><i class="fas fa-table"></i> Detail Nilai Per Unsur (NPU)</h3><div style="overflow-x:auto"><table class="dt" id="tb"></table></div></div><div class="ft">Dashboard SKM RSUD Mimika — Data tersinkron dari Google Sheets — Update: <span id="lu">-</span> — Method: <span id="fm">-</span></div></div>
<div class="es" id="es" style="display:none"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat Data</h3><p id="em"></p><button class="btn" onclick="refresh()"><i class="fas fa-sync-alt"></i> Coba Lagi</button></div>

<script>
// CONFIG
const SHEET_ID='1d0ne2PUC0ppPZu9byH3_KVGGpzSmbUHXa8J1UywMyz0';
const PUB_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vTEKRFBkIZHy-c8Es94dcyMg43OocyUvcOFJgB8i0zpjLALZdG4cjJzohb0jzdPZs6cqubhVnkLI1NL/pub?output=csv';
const PROXY='https://api.allorigins.win/raw?url='+encodeURIComponent(PUB_CSV);
const SKM_SCALE={A:{min:3.51,max:4,label:'Sangat Baik'},B:{min:3.01,max:3.5,label:'Baik'},C:{min:2.51,max:3,label:'Cukup'},D:{min:2,max:2.5,label:'Kurang'}};
const RL={1:'a. Tidak/Buruk',2:'b. Kurang',3:'c. Sesuai/Baik',4:'d. Sangat Baik'};
const RC={1:'#ef4444',2:'#f59e0b',3:'#3b82f6',4:'#10b981'};
const cc=v=>v>=3.51?'#10b981':v>=3.01?'#3b82f6':v>=2.51?'#f59e0b':'#ef4444';
const CO={responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#f1f5f9'}},tooltip:{backgroundColor:'#1e293b',titleColor:'#f1f5f9',bodyColor:'#94a3b8'}}};
let pd=null,ch={},cf='all',fm='';

// SKM letter-to-number
function er(t){if(typeof t==='number'&&1<=t&&t<=5)return t;if(!t||typeof t!=='string')return null;const s=t.trim().toLowerCase();if(!s)return null;if(s[0]in{a:1,b:1,c:1,d:1,e:1}&&(s.length===1||s[1]in'. '))return{a:1,b:2,c:3,d:4,e:5}[s[0]];try{const v=parseInt(s);if(1<=v&&v<=5)return v}catch{}return null}

// CSV Parser
function pcsv(csv){const ls=csv.split('\n');function pl(l){const f=[];let i=0,fd='',iq=false;while(i<l.length){const c=l[i];if(iq){if(c==='"'&&l[i+1]=== '"'){fd+='"';i+=2}else if(c=== '"''){iq=false;i++}else{fd+=c;i++}}else{if(c=== '"''){iq=true;i++}else if(c===',''){f.push(fd.trim());fd='';i++}else{fd+=c;i++}}}f.push(fd.trim());return f}
const hdr=pl(ls[0]),data=[];
for(let r=1;r<ls.length;r++){if(!ls[r].trim())continue;const v=pl(ls[r]),o={};hdr.forEach((h,i)=>{let val=v[i]||'';const rt=er(val);if(rt!==null)o[h]=rt;else o[h]=val});data.push(o)}
return{headers:hdr,data}}

// Fetch — try multiple methods
async function fetchData(){
// Method 1: Gviz JSONP (CORS-free, works from any origin)
try{const r=await gvizFetch();if(r&&r.data.length>0){fm='Gviz JSONP';return r}}catch{}
// Method 2: Direct CSV (works from HTTPS origin like GitHub Pages)
try{const r=await fetch(PUB_CSV,{mode:'cors'});if(r.ok){const csv=await r.text();const p=pcsv(csv);const qc=p.headers.filter(h=>h&&/^\d\./.test(h));const valid=p.data.filter(r=>qc.some(c=>typeof r[c]==='number'&&r[c]>0));if(valid.length>0){fm='Direct CSV';return{headers:p.headers,data:valid}}}}catch{}
// Method 3: CORS proxy
try{const r=await fetch(PROXY);if(r.ok){const csv=await r.text();const p=pcsv(csv);const qc=p.headers.filter(h=>h&&/^\d\./.test(h));const valid=p.data.filter(r=>qc.some(c=>typeof r[c]==='number'&&r[c]>0));if(valid.length>0){fm='CORS Proxy';return{headers:p.headers,data:valid}}}}catch{}
throw new Error('All fetch methods failed. Pastikan Google Sheet sudah Publish to web dan Share: Anyone with the link can view.')
}

function gvizFetch(){const cb='gv_'+Date.now();const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}`;return new Promise((res,rej)=>{const tm=setTimeout(()=>{cl();rej(new Error('timeout'))},12000);window[cb]=r=>{clearTimeout(tm);cl();if(r.status==='ok'){const t=r.table,h=t.cols.map(c=>c.label||c.id),d=t.rows.map(row=>{const o={};t.cols.forEach((c,i)=>{const cell=row.c[i];const raw=cell?(cell.v!==null?cell.v:(cell.f||'')):'';const rt=er(raw);if(rt!==null)o[c.label||c.id]=rt;else o[c.label||c.id]=raw};return o});const valid=d.filter(r=>h.some(c=>typeof r[c]==='number'&&r[c]>0));if(valid.length>0)res({headers:h,data:valid});else rej(new Error('No valid rows'))}else rej(new Error('Gviz:'+r.status))};const sc=document.createElement('script');sc.id='gvS';sc.src=url;sc.onerror=()=>{clearTimeout(tm);cl();rej(new Error('Gviz load fail'))};document.head.appendChild(sc);function cl(){delete window[cb];const s=document.getElementById('gvS');if(s)s.remove()}})}

// Analysis
function analyze(data,fields){
const tsC=fields.filter(f=>/timestamp|waktu|tanggal|time|date/i.test(f)||f===fields[0]);
const qC=fields.filter(f=>f&&/^\d\./.test(f));
const rC=qC.filter(c=>{const v=data.map(r=>r[c]).filter(v=>typeof v==='number'&&v>0);return v.length>data.length*.05});
const tC=fields.filter(f=>!tsC.includes(f)&&!rC.includes(f));
let mx=4;if(rC.length>0){const av=rC.flatMap(c=>data.map(r=>r[c]).filter(v=>typeof v==='number'&&v>0));mx=av.length>0?Math.max(...av):4;mx=mx<=4?4:5}
const gC=tC.filter(f=>{const u=[...new Set(data.map(r=>r[f]).filter(v=>v&&String(v).trim()))];return u.length>1&&u.length<=100&&u.length<data.length*.5});
const npu={};rC.forEach(c=>{const v=data.map(r=>r[c]).filter(v=>typeof v==='number'&&v>0);npu[c]=v.length>0?v.reduce((a,b)=>a+b,0)/v.length:0});
const nv=Object.values(npu).filter(v=>v>0),ikm=nv.length>0?nv.reduce((a,b)=>a+b,0)/nv.length:0;
let qg='D';for(const[g,r]of Object.entries(SKM_SCALE)){if(ikm>=r.min&&ikm<=r.max){qg=g;break}}if(ikm>4)qg='A';
const ql=SKM_SCALE[qg]?SKM_SCALE[qg].label:'Sangat Baik';
const dist={};rC.forEach(c=>{dist[c]={};for(let i=1;i<=mx;i++)dist[c][i]=0;data.forEach(r=>{const v=r[c];if(typeof v==='number'&&v>=1&&v<=mx)dist[c][v]++})});
const gc=gC.includes('Unit')?'Unit':(gC[0]||'');
const ga={};if(gc){const units=[...new Set(data.map(r=>r[gc]).filter(v=>v&&String(v).trim()))];units.forEach(u=>{const gd=data.filter(r=>String(r[gc]).trim()===u);const gn={};rC.forEach(c=>{const v=gd.map(r=>r[c]).filter(v=>typeof v==='number'&&v>0);gn[c]=v.length>0?v.reduce((a,b)=>a+b,0)/v.length:0});const gv=Object.values(gn).filter(v=>v>0);const gi=gv.length>0?gv.reduce((a,b)=>a+b,0)/gv.length:0;let gg='D';for(const[g,r]of Object.entries(SKM_SCALE)){if(gi>=r.min&&gi<=r.max){gg=g;break}}if(gi>4)gg='A';ga[u]={npu:gn,ikm:gi,count:gd.length,grade:gg}})}
const trend=[];if(tsC.length>0){const tsc=tsC[0],sorted=[...data].filter(r=>r[tsc]).sort((a,b)=>new Date(a[tsc])-new Date(b[tsc]));const bd={};sorted.forEach(r=>{let d;try{const dt=new Date(r[tsc]);d=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')}catch{d='N/A'}if(!bd[d])bd[d]=[];bd[d].push(r)});Object.entries(bd).forEach(([d,rs])=>{const dn={};rC.forEach(c=>{const v=rs.map(r=>r[c]).filter(v=>typeof v==='number'&&v>0);dn[c]=v.length>0?v.reduce((a,b)=>a+b,0)/v.length:0});const dv=Object.values(dn).filter(v=>v>0);trend.push({date:d,ikm:dv.length>0?dv.reduce((a,b)=>a+b,0)/dv.length:0,count:rs.length})})}
return{fields,data,tsC,rC,tC,gC,mx,npu,ikm,qg,ql,dist,gc,ga,trend,total:data.length}}

const sn=c=>c.replace(/^\d+[\.\)]\s*/,'').replace(/^.*?:\s*/,'').substring(0,55);

// RENDER
function render(d){
const q=SKM_SCALE[d.qg]||{label:'Sangat Baik'};
document.getElementById('kr').innerHTML=[{i:'fa-users',l:'Total Responden',v:d.total,s:'Jumlah survei'},{i:'fa-chart-line',l:'IKM',v:d.ikm.toFixed(2),s:d.qg+' - '+d.ql},{i:'fa-percentage',l:'% Kepuasan',v:(d.ikm/d.mx*100).toFixed(1)+'%',s:'Skala 1-'+d.mx},{i:'fa-star',l:'Rata-rata NPU',v:(Object.values(d.npu).filter(v=>v>0).reduce((a,b)=>a+b,0)/Object.values(d.npu).filter(v=>v>0).length||0).toFixed(2),s:d.rC.length+' unsur'},{i:'fa-award',l:'Mutu Pelayanan',v:d.qg,s:d.ql}].map(k=>`<div class="kc"><div class="ki"><i class="fas ${k.i}"></i></div><div class="kl">${k.l}</div><div class="kv">${k.v}</div><div class="ks">${k.s}</div></div>`).join('');
let fh='<span class="fl"><i class="fas fa-filter"></i> Unit:</span>';
const units=Object.keys(d.ga).sort();fh+=`<select id="fg" onchange="af()"><option value="all">Semua Unit (${d.total})</option>${units.map(u=>`<option value="${u}">${u} (${d.ga[u].count})</option>`).join('')}</select>`;
document.getElementById('fb').innerHTML=fh;
rCharts(d);rTable(d);
document.getElementById('lu').textContent=new Date().toLocaleString('id-ID');document.getElementById('fm').textContent=fm;
document.getElementById('lo').classList.add('h');document.getElementById('mc').style.display='block';document.getElementById('es').style.display='none';
document.getElementById('dot').className='dot';document.getElementById('stxt').textContent=`Online (${fm}) - ${d.total} responden`;
}

function af(){cf=document.getElementById('fg')?.value||'all';rCharts(pd);rTable(pd)}
function gfa(d){if(cf==='all')return{npu:d.npu,ikm:d.ikm,qg:d.qg,dist:d.dist,count:d.total};const g=d.ga[cf];if(!g)return{npu:d.npu,ikm:d.ikm,qg:d.qg,dist:d.dist,count:d.total};const ds={};d.rC.forEach(c=>{ds[sn(c)]={};for(let i=1;i<=d.mx;i++)ds[sn(c)][i]=0});return{npu:g.npu,ikm:g.ikm,qg:g.grade,dist:ds,count:g.count}}

function dc(){Object.values(ch).forEach(c=>c.destroy());ch={}}
function ac(g,id,ic,t,f=false){const d=document.createElement('div');d.className=`cc${f?' cf':''}`;d.innerHTML=`<h3><i class="fas ${ic}"></i> ${t}</h3><div class="cw"><canvas id="${id}"></canvas></div>`;g.appendChild(d)}

function rCharts(d){
dc();const fa=gfa(d),g=document.getElementById('cg');g.innerHTML='';
const lbl=d.rC.map(sn),vals=d.rC.map(c=>fa.npu[c]||0),cols=vals.map(cc);

// 1 NPU
ac(g,'c1','fa-chart-bar','Nilai Per Unsur (NPU)');
ch.npu=new Chart(document.getElementById('c1'),{type:'bar',data:{labels,datasets:[{label:`NPU (n=${fa.count})`,data:vals,backgroundColor:cols.map(c=>c+'33'),borderColor:cols,borderWidth:2,borderRadius:6}]},options:{...CO,indexAxis:lbl.length>8?'y':'x',scales:{y:{beginAtZero:true,max:d.mx+.5,grid:{color:'#334155'},ticks:{color:'#94a3b8'}},x:{grid:{color:'#334155'},ticks:{color:'#94a3b8',maxRotation:45}}}}});

// 2 Radar
ac(g,'c2','fa-crosshairs','Radar Kepuasan');
ch.rad=new Chart(document.getElementById('c2'),{type:'radar',data:{labels,datasets:[{label:`IKM: ${fa.ikm.toFixed(2)}`,data:vals,backgroundColor:'rgba(99,102,241,.15)',borderColor:'#6366f1',borderWidth:2,pointBackgroundColor:'#6366f1',pointBorderColor:'#fff',pointRadius:4}]},options:{...CO,scales:{r:{beginAtZero:true,max:d.mx+.5,grid:{color:'#334155'},angleLines:{color:'#334155'},pointLabels:{color:'#94a3b8',font:{size:10}},ticks:{color:'#94a3b8',backdropColor:'#0f172a'}}}}});

// 3 Distribution (only all filter)
if(cf==='all'&&d.dist){ac(g,'c3','fa-chart-area','Distribusi Penilaian');const ds=[];for(let i=1;i<=d.mx;i++)ds.push({label:RL[i]||`Nilai ${i}`,data:d.rC.map(c=>d.dist[c][i]||0),backgroundColor:(RC[i]||'#6366f1')+'55',borderColor:RC[i]||'#6366f1',borderWidth:1,borderRadius:4});
ch.dist=new Chart(document.getElementById('c3'),{type:'bar',data:{labels,datasets:ds},options:{...CO,scales:{y:{stacked:true,beginAtZero:true,grid:{color:'#334155'},ticks:{color:'#94a3b8'}},x:{stacked:true,grid:{color:'#334155'},ticks:{color:'#94a3b8',maxRotation:45}}}}})}

// 4 Doughnut
ac(g,'c4','fa-circle-half-stroke','Distribusi Tingkat Kepuasan');
const od={};for(let i=1;i<=d.mx;i++)od[i]=0;if(cf==='all'&&d.dist)for(const v of Object.values(d.dist))for(let i=1;i<=d.mx;i++)od[i]+=v[i]||0;
const tv=Object.values(od).reduce((a,b)=>a+b,0);const pL=[],pD=[],pC=[];for(let i=d.mx;i>=1;i--)if(od[i]>0){pL.push(RL[i]);pD.push(od[i]);pC.push(RC[i])}
ch.pie=new Chart(document.getElementById('c4'),{type:'doughnut',data:{labels:pL,datasets:[{data:pD,backgroundColor:pC.map(c=>c+'99'),borderColor:pC,borderWidth:2}]},options:{...CO,cutout:'55%',plugins:{...CO.plugins,legend:{position:'bottom',labels:{color:'#f1f5f9',padding:12}},tooltip:{...CO.plugins.tooltip,callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed} (${((ctx.parsed/tv)*100).toFixed(1)}%)`}}}}});

// 5 Trend
if(d.trend&&d.trend.length>1){ac(g,'c5','fa-timeline','Trend IKM per Bulan',true);
ch.trend=new Chart(document.getElementById('c5'),{type:'line',data:{labels:d.trend.map(t=>t.date),datasets:[{label:'IKM',data:d.trend.map(t=>t.ikm),borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.1)',borderWidth:2,fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#6366f1'},{label:'Responden',data:d.trend.map(t=>t.count),borderColor:'#f59e0b',borderWidth:2,fill:false,tension:.3,pointRadius:3,yAxisID:'y1'}]},options:{...CO,scales:{y:{beginAtZero:true,max:d.mx+.5,grid:{color:'#334155'},ticks:{color:'#94a3b8'},title:{display:true,text:'IKM',color:'#94a3b8'}},y1:{position:'right',beginAtZero:true,grid:{drawOnChartArea:false},ticks:{color:'#94a3b8'},title:{display:true,text:'Responden',color:'#94a3b8'}},x:{grid:{color:'#334155'},ticks:{color:'#94a3b8'}}}}})}

// 6 Group comparison
if(Object.keys(d.ga).length>1){const su=Object.keys(d.ga).sort((a,b)=>d.ga[b].ikm-d.ga[a].ikm),gv=su.map(u=>d.ga[u].ikm),gn=su.map(u=>d.ga[u].count),gc2=gv.map(cc);
ac(g,'c6','fa-building','Perbandingan IKM per Unit',true);
ch.grp=new Chart(document.getElementById('c6'),{type:'bar',data:{labels:su,datasets:[{label:'IKM',data:gv,backgroundColor:gc2.map(c=>c+'33'),borderColor:gc2,borderWidth:2,borderRadius:6}]},options:{...CO,scales:{y:{beginAtZero:true,max:d.mx+.5,grid:{color:'#334155'},ticks:{color:'#94a3b8'}},x:{grid:{color:'#334155'},ticks:{color:'#94a3b8',maxRotation:45}}},plugins:{...CO.plugins,tooltip:{...CO.plugins.tooltip,callbacks:{afterLabel:ctx=>`Responden: ${gn[ctx.dataIndex]}`}}}}})}

// 7 Demographics
if(d.demographics){const dk=Object.keys(d.demographics);dk.forEach(k=>{if(k==='Jenis Kelamin'||k==='Pendidikan'){ac(g,'c_dem_'+k,k==='Jenis Kelamin'?'fa-venus-mars':'fa-graduation-cap',k);const lb=Object.keys(d.demographics[k]),vl=Object.values(d.demographics[k]),cl2=lb.map((_,i)=>['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6','#06b6d4'][i%7]);
ch['dem_'+k]=new Chart(document.getElementById('c_dem_'+k),{type:'doughnut',data:{labels:lb,datasets:[{data:vl,backgroundColor:cl2.map(c=>c+'99'),borderColor:cl2,borderWidth:2}]},options:{...CO,cutout:'45%',plugins:{...CO.plugins,legend:{position:'bottom',labels:{color:'#f1f5f9',padding:8}}}}})}})}

function rTable(d){const fa=gfa(d);let h=`<thead><tr><th>No</th><th>Unsur Pelayanan</th><th>NPU</th><th>Skala</th><th>Mutu</th></tr></thead><tbody>`;
d.rC.forEach((c,i)=>{const v=fa.npu[c]||0;let g='D';for(const[gr,r]of Object.entries(SKM_SCALE)){if(v>=r.min&&v<=r.max){g=gr;break}}if(v>4)g='A';h+=`<tr><td class="n">${i+1}</td><td>${sn(c)}</td><td class="n" style="font-weight:700;color:${cc(v)}">${v.toFixed(2)}</td><td class="n">1-${d.mx}</td><td><span class="qb q${g}">${g} - ${SKM_SCALE[g]?.label||'Sangat Baik'}</span></td></tr>`});
h+=`<tr style="background:rgba(99,102,241,.1);font-weight:700"><td></td><td>IKM (Indeks Kepuasan Masyarakat)</td><td class="n" style="font-size:16px">${fa.ikm.toFixed(2)}</td><td class="n">1-${d.mx}</td><td><span class="qb q${fa.qg}" style="font-size:13px">${fa.qg} - ${SKM_SCALE[fa.qg]?.label||'Sangat Baik'}</span></td></tr></tbody>`;
document.getElementById('tb').innerHTML=h}

async function refresh(){document.getElementById('ric').classList.add('fa-spin');document.getElementById('dot').className='dot ld';document.getElementById('stxt').textContent='Menyinkronkan...';
try{const r=await fetchData();pd=analyze(r.data,r.headers);cf='all';render(pd)}catch(e){document.getElementById('lo').classList.add('h');document.getElementById('mc').style.display='none';document.getElementById('es').style.display='block';document.getElementById('em').textContent=e.message;document.getElementById('dot').className='dot off';document.getElementById('stxt').textContent='Offline'}
document.getElementById('ric').classList.remove('fa-spin')}

(async()=>{try{const r=await fetchData();pd=analyze(r.data,r.headers);render(pd)}catch(e){document.getElementById('lo').classList.add('h');document.getElementById('es').style.display='block';document.getElementById('em').textContent=e.message;document.getElementById('dot').className='dot off';document.getElementById('stxt').textContent='Offline'}})();
</script>
