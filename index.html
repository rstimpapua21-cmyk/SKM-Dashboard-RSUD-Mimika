<div class="hdr"><div class="hdr-i"><div class="hdr-t"><div class="hdr-ic"><i class="fas fa-hospital"></i></div><div class="hdr-h"><h1>Dashboard SKM RSUD Mimika</h1><p>Survey Kepuasan Masyarakat &mdash; Real-time Sync</p></div></div><div style="display:flex;align-items:center;gap:16px"><div class="syn"><div class="dot ld" id="dot"></div><span id="stxt">Menyinkronkan...</span></div><button class="btn" onclick="refresh()"><i class="fas fa-sync-alt" id="ric"></i> Refresh</button></div></div></div>

<div class="es" id="es" style="display:none"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat Data</h3><p id="em"></p><button class="btn" onclick="refresh()"><i class="fas fa-sync-alt"></i> Coba Lagi</button></div>

<script>
/* ===== CONFIG ===== */
const PUB_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTEKRFBkIZHy-c8Es94dcyMg43OocyUvcOFJgB8i0zpjLALZdG4cjJzohb0jzdPZs6cqubhVnkLI1NL/pub?output=csv';
const GVIZ_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTEKRFBkIZHy-c8Es94dcyMg43OocyUvcOFJgB8i0zpjLALZdG4cjJzohb0jzdPZs6cqubhVnkLI1NL/pub?output=csv&gid=0';

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const SKM_SCALE = {
    A: { min: 3.51, max: 4.00, label: 'Sangat Baik' },
    B: { min: 3.01, max: 3.50, label: 'Baik' },
    C: { min: 2.51, max: 3.00, label: 'Cukup' },
    D: { min: 2.00, max: 2.50, label: 'Kurang' }
};

const RL = { 1:'a. Tidak/Buruk', 2:'b. Kurang', 3:'c. Sesuai/Baik', 4:'d. Sangat Baik' };
const RC = { 1:'#ef4444', 2:'#f59e0b', 3:'#3b82f6', 4:'#10b981' };

const colorByGrade = v => v>=3.51?'#10b981':v>=3.01?'#3b82f6':v>=2.51?'#f59e0b':'#ef4444';
const CHART_OPTS = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
        legend: { labels: { color:'#f1f5f9' } },
        tooltip: { backgroundColor:'#1e293b', titleColor:'#f1f5f9', bodyColor:'#94a3b8' }
    }
};

let pd = null, charts = {}, currentFilter = 'all', fetchMethod = '';

/* ===== SKM letter-to-number conversion ===== */
function extractRating(val) {
    if (typeof val === 'number' && val >= 1 && val <= 5) return val;
    if (!val || typeof val !== 'string') return null;
    const s = val.trim().toLowerCase();
    if (!s) return null;

    // Letter ratings: a=1, b=2, c=3, d=4, e=5
    const first = s.charAt(0);
    if ('abcde'.includes(first) && (s.length === 1 || s.charAt(1) === '.' || s.charAt(1) === ' ')) {
        return { a:1, b:2, c:3, d:4, e:5 }[first];
    }

    // Numeric
    const n = parseInt(s, 10);
    if (n >= 1 && n <= 5) return n;

    return null;
}

/* ===== CSV Parser (RFC 4180 compliant) ===== */
function parseCSVLine(line) {
    const fields = [];
    let i = 0, field = '', inQuote = false;

    while (i < line.length) {
        const ch = line.charAt(i);

        if (inQuote) {
            if (ch === '"' && i + 1 < line.length && line.charAt(i + 1) === '"') {
                // Escaped double-quote ""
                field += '"';
                i += 2;
            } else if (ch === '"') {
                // End of quoted field
                inQuote = false;
                i++;
            } else {
                field += ch;
                i++;
            }
        } else {
            if (ch === '"') {
                // Start of quoted field
                inQuote = true;
                i++;
            } else if (ch === ',') {
                fields.push(field.trim());
                field = '';
                i++;
            } else {
                field += ch;
                i++;
            }
        }
    }
    fields.push(field.trim());
    return fields;
}

function parseCSV(csvText) {
    const lines = csvText.split(/\r?\n/);
    const headers = parseCSVLine(lines[0]);
    const data = [];

    for (let r = 1; r < lines.length; r++) {
        if (!lines[r].trim()) continue;
        const values = parseCSVLine(lines[r]);
        const row = {};
        headers.forEach((h, i) => {
            const raw = values[i] || '';
            const rating = extractRating(raw);
            if (rating !== null) {
                row[h] = rating;
            } else {
                row[h] = raw;
            }
        });
        data.push(row);
    }

    return { headers, data };
}

/* ===== Fetch Data ===== */
function isValidCSV(text) {
    if (!text || text.length < 20) return false;
    if (text.trim().startsWith('<') || text.trim().startsWith('{')) return false;
    const firstLine = text.split(/\r?\n/)[0];
    if (!firstLine || firstLine.split(',').length < 3) return false;
    return true;
}

async function fetchData() {
    const sources = [
        { url: PUB_CSV, label: 'Direct CSV', mode: 'cors' },
        { url: GVIZ_CSV, label: 'Google CSV (fallback)', mode: 'cors' }
    ];

    for (const src of sources) {
        try {
            console.log('[SKM] Trying: ' + src.label);
            const response = await fetch(src.url, { mode: src.mode });
            if (!response.ok) {
                console.warn('[SKM] ' + src.label + ' HTTP ' + response.status);
                continue;
            }
            const csvText = await response.text();
            if (!isValidCSV(csvText)) {
                console.warn('[SKM] ' + src.label + ' response not valid CSV');
                continue;
            }
            console.log('[SKM] CSV size: ' + csvText.length + ' chars, ' + csvText.split(/\r?\n/).length + ' lines');
            const parsed = parseCSV(csvText);
            const qCols = parsed.headers.filter(h => h && /^\d\./.test(h.trim()));
            const validRows = parsed.data.filter(row => qCols.some(c => typeof row[c] === 'number' && row[c] > 0));
            console.log('[SKM] Question columns: ' + qCols.length + ', Valid rows: ' + validRows.length + ' / ' + parsed.data.length);
            if (validRows.length === 0) {
                console.warn('[SKM] ' + src.label + ' no valid data rows');
                continue;
            }
            fetchMethod = src.label;
            return { headers: parsed.headers, data: validRows };
        } catch (e) {
            console.warn('[SKM] ' + src.label + ' failed: ' + e.message);
        }
    }
    throw new Error('Gagal memuat data dari semua sumber. Pastikan Google Sheets dipublikasi.');
}

/* ===== Analysis ===== */
function analyze(data, fields) {
    // Identify column types
    const tsCols = fields.filter(f => /timestamp|waktu|tanggal|time|date/i.test(f) || f === fields[0]);
    const qCols = fields.filter(f => f && /^\d\./.test(f.trim()));
    // Filter question columns that have enough numeric data
    const rCols = qCols.filter(c => {
        const vals = data.map(r => r[c]).filter(v => typeof v === 'number' && v > 0);
        return vals.length > data.length * 0.05;
    });
    const textCols = fields.filter(f => !tsCols.includes(f) && !rCols.includes(f));

    // Determine max rating scale
    let maxRating = 4;
    if (rCols.length > 0) {
        const allVals = rCols.flatMap(c => data.map(r => r[c]).filter(v => typeof v === 'number' && v > 0));
        if (allVals.length > 0) {
            maxRating = Math.max(...allVals);
            maxRating = maxRating <= 4 ? 4 : 5;
        }
    }

    // Group columns (like Unit)
    const groupCols = textCols.filter(f => {
        const unique = [...new Set(data.map(r => r[f]).filter(v => v && String(v).trim()))];
        return unique.length > 1 && unique.length <= 100 && unique.length < data.length * 0.5;
    });

    // Calculate NPU (Nilai Per Unsur)
    const npu = {};
    rCols.forEach(c => {
        const vals = data.map(r => r[c]).filter(v => typeof v === 'number' && v > 0);
        npu[c] = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
    });

    // Calculate IKM (Indeks Kepuasan Masyarakat)
    const npuValues = Object.values(npu).filter(v => v > 0);
    const ikm = npuValues.length > 0 ? npuValues.reduce((a, b) => a + b, 0) / npuValues.length : 0;

    // Determine quality grade
    let qualityGrade = 'D';
    for (const [grade, range] of Object.entries(SKM_SCALE)) {
        if (ikm >= range.min && ikm <= range.max) { qualityGrade = grade; break; }
    }
    if (ikm > 4) qualityGrade = 'A';
    const qualityLabel = SKM_SCALE[qualityGrade] ? SKM_SCALE[qualityGrade].label : 'Sangat Baik';

    // Distribution
    const dist = {};
    rCols.forEach(c => {
        dist[c] = {};
        for (let i = 1; i <= maxRating; i++) dist[c][i] = 0;
        data.forEach(r => {
            const v = r[c];
            if (typeof v === 'number' && v >= 1 && v <= maxRating) dist[c][v]++;
        });
    });

    // Group analysis (per Unit)
    const groupColName = groupCols.includes('Unit') ? 'Unit' : (groupCols[0] || '');
    const groupAnalysis = {};
    if (groupColName) {
        const units = [...new Set(data.map(r => r[groupColName]).filter(v => v && String(v).trim()))];
        units.forEach(u => {
            const groupData = data.filter(r => String(r[groupColName]).trim() === u);
            const groupNpu = {};
            rCols.forEach(c => {
                const vals = groupData.map(r => r[c]).filter(v => typeof v === 'number' && v > 0);
                groupNpu[c] = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
            });
            const groupVals = Object.values(groupNpu).filter(v => v > 0);
            const groupIkm = groupVals.length > 0 ? groupVals.reduce((a, b) => a + b, 0) / groupVals.length : 0;
            let groupGrade = 'D';
            for (const [grade, range] of Object.entries(SKM_SCALE)) {
                if (groupIkm >= range.min && groupIkm <= range.max) { groupGrade = grade; break; }
            }
            if (groupIkm > 4) groupGrade = 'A';
            groupAnalysis[u] = { npu: groupNpu, ikm: groupIkm, count: groupData.length, grade: groupGrade };
        });
    }

    // Trend (monthly)
    const trend = [];
    if (tsCols.length > 0) {
        const tsCol = tsCols[0];
        const sorted = [...data].filter(r => r[tsCol]).sort((a, b) => new Date(a[tsCol]) - new Date(b[tsCol]));
        const byDate = {};
        sorted.forEach(r => {
            let dateKey;
            try {
                const dt = new Date(r[tsCol]);
                dateKey = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0');
            } catch { dateKey = 'N/A'; }
            if (!byDate[dateKey]) byDate[dateKey] = [];
            byDate[dateKey].push(r);
        });
        Object.entries(byDate).forEach(([dateKey, rows]) => {
            const dateNpu = {};
            rCols.forEach(c => {
                const vals = rows.map(r => r[c]).filter(v => typeof v === 'number' && v > 0);
                dateNpu[c] = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
            });
            const dateVals = Object.values(dateNpu).filter(v => v > 0);
            trend.push({
                date: dateKey,
                ikm: dateVals.length > 0 ? dateVals.reduce((a, b) => a + b, 0) / dateVals.length : 0,
                count: rows.length
            });
        });
    }

    return {
        fields, data, tsCols, rCols, textCols, groupCols,
        maxRating, npu, ikm, qualityGrade, qualityLabel,
        dist, groupColName, groupAnalysis, trend,
        total: data.length
    };
}

/* Short name for question columns */
const shortName = c => c.replace(/^\d+[\.\)]\s*/, '').replace(/^.*?:\s*/, '').substring(0, 55);

/* ===== RENDER ===== */
function render(d) {
    // KPI cards
    const avgNpu = Object.values(d.npu).filter(v => v > 0);
    const avgNpuVal = avgNpu.length > 0 ? avgNpu.reduce((a,b) => a+b, 0) / avgNpu.length : 0;
    const kpis = [
        { icon:'fa-users', label:'Total Responden', value:d.total, sub:'Jumlah survei' },
        { icon:'fa-chart-line', label:'IKM', value:d.ikm.toFixed(2), sub:d.qualityGrade + ' - ' + d.qualityLabel },
        { icon:'fa-percentage', label:'% Kepuasan', value:(d.ikm/d.maxRating*100).toFixed(1)+'%', sub:'Skala 1-'+d.maxRating },
        { icon:'fa-star', label:'Rata-rata NPU', value:avgNpuVal.toFixed(2), sub:d.rCols.length+' unsur' },
        { icon:'fa-award', label:'Mutu Pelayanan', value:d.qualityGrade, sub:d.qualityLabel }
    ];
    document.getElementById('kr').innerHTML = kpis.map(k =>
        '<div class="kc"><div class="ki"><i class="fas '+k.icon+'"></i></div><div class="kl">'+k.label+'</div><div class="kv">'+k.value+'</div><div class="ks">'+k.sub+'</div></div>'
    ).join('');

    // Unit filter
    const units = Object.keys(d.groupAnalysis).sort();
    let filterHtml = '<span class="fl"><i class="fas fa-filter"></i> Unit:</span>';
    filterHtml += '<select id="fg" onchange="applyFilter()">';
    filterHtml += '<option value="all">Semua Unit (' + d.total + ')</option>';
    filterHtml += units.map(u => '<option value="'+escapeHtml(u)+'">'+escapeHtml(u)+' ('+d.groupAnalysis[u].count+')</option>').join('');
    filterHtml += '</select>';
    document.getElementById('fb').innerHTML = filterHtml;

    renderCharts(d);
    renderTable(d);

    // Footer info
    document.getElementById('lu').textContent = new Date().toLocaleString('id-ID');
    document.getElementById('fm').textContent = fetchMethod;
    // Show UI
    document.getElementById('lo').classList.add('h');
    document.getElementById('mc').style.display = 'block';
    document.getElementById('es').style.display = 'none';
    document.getElementById('dot').className = 'dot';
    document.getElementById('stxt').textContent = 'Online (' + fetchMethod + ') - ' + d.total + ' responden';
}

function applyFilter() {
    currentFilter = document.getElementById('fg') ? document.getElementById('fg').value : 'all';
    renderCharts(pd);
    renderTable(pd);
}

function getFilteredAnalysis(d) {
    if (currentFilter === 'all') {
        return { npu: d.npu, ikm: d.ikm, qualityGrade: d.qualityGrade, dist: d.dist, count: d.total };
    }
    const g = d.groupAnalysis[currentFilter];
    if (!g) return { npu: d.npu, ikm: d.ikm, qualityGrade: d.qualityGrade, dist: d.dist, count: d.total };
    const ds = {};
    d.rCols.forEach(c => {
        ds[shortName(c)] = {};
        for (let i = 1; i <= d.maxRating; i++) ds[shortName(c)][i] = 0;
    });
    return { npu: g.npu, ikm: g.ikm, qualityGrade: g.grade, dist: ds, count: g.count };
}

/* ===== CHARTS ===== */
function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

function addChartCard(grid, id, icon, title, fullWidth) {
    const div = document.createElement('div');
    div.className = 'cc' + (fullWidth ? ' cf' : '');
    div.innerHTML = '<h3><i class="fas ' + icon + '"></i> ' + escapeHtml(title) + '</h3><div class="cw"><canvas id="' + id + '"></canvas></div>';
    grid.appendChild(div);
}

function renderCharts(d) {
    destroyCharts();
    const fa = getFilteredAnalysis(d);
    const grid = document.getElementById('cg');
    grid.innerHTML = '';
    const labels = d.rCols.map(shortName);
    const values = d.rCols.map(c => fa.npu[c] || 0);
    const barColors = values.map(colorByGrade);

    // 1. NPU Bar Chart
    addChartCard(grid, 'c1', 'fa-chart-bar', 'Nilai Per Unsur (NPU)');
    charts.npu = new Chart(document.getElementById('c1'), {
        type: 'bar',
        data: { labels, datasets: [{
            label: 'NPU (n=' + fa.count + ')',
            data: values,
            backgroundColor: barColors.map(c => c + '33'),
            borderColor: barColors,
            borderWidth: 2, borderRadius: 6
        }] },
        options: { ...CHART_OPTS,
            indexAxis: labels.length > 8 ? 'y' : 'x',
            scales: {
                y: { beginAtZero:true, max:d.maxRating+0.5, grid:{color:'#334155'}, ticks:{color:'#94a3b8'} },
                x: { grid:{color:'#334155'}, ticks:{color:'#94a3b8', maxRotation:45} }
            }
        }
    });

    // 2. Radar
    addChartCard(grid, 'c2', 'fa-crosshairs', 'Radar Kepuasan');
    charts.rad = new Chart(document.getElementById('c2'), {
        type: 'radar',
        data: { labels, datasets: [{
            label: 'IKM: ' + fa.ikm.toFixed(2),
            data: values,
            backgroundColor:'rgba(99,102,241,.15)',
            borderColor:'#6366f1', borderWidth:2,
            pointBackgroundColor:'#6366f1', pointBorderColor:'#fff', pointRadius:4
        }] },
        options: { ...CHART_OPTS,
            scales: { r: {
                beginAtZero:true, max:d.maxRating+0.5,
                grid:{color:'#334155'}, angleLines:{color:'#334155'},
                pointLabels:{color:'#94a3b8', font:{size:10}},
                ticks:{color:'#94a3b8', backdropColor:'#0f172a'}
            }}
        }
    });

    // 3. Distribution (stacked) — only when "all" filter
    if (currentFilter === 'all' && d.dist) {
        addChartCard(grid, 'c3', 'fa-chart-area', 'Distribusi Penilaian');
        const ds = [];
        for (let i = 1; i <= d.maxRating; i++) {
            ds.push({
                label: RL[i] || ('Nilai ' + i),
                data: d.rCols.map(c => d.dist[c][i] || 0),
                backgroundColor: (RC[i]||'#6366f1') + '55',
                borderColor: RC[i]||'#6366f1',
                borderWidth: 1, borderRadius: 4
            });
        }
        charts.dist = new Chart(document.getElementById('c3'), {
            type: 'bar',
            data: { labels, datasets: ds },
            options: { ...CHART_OPTS,
                scales: {
                    y: { stacked:true, beginAtZero:true, grid:{color:'#334155'}, ticks:{color:'#94a3b8'} },
                    x: { stacked:true, grid:{color:'#334155'}, ticks:{color:'#94a3b8', maxRotation:45} }
                }
            }
        });
    }

    // 4. Doughnut — satisfaction distribution
    addChartCard(grid, 'c4', 'fa-circle-half-stroke', 'Distribusi Tingkat Kepuasan');
    const overallDist = {};
    for (let i = 1; i <= d.maxRating; i++) overallDist[i] = 0;
    if (currentFilter === 'all' && d.dist) {
        for (const v of Object.values(d.dist)) {
            for (let i = 1; i <= d.maxRating; i++) overallDist[i] += v[i] || 0;
        }
    }
    const totalResponses = Object.values(overallDist).reduce((a,b) => a+b, 0);
    const pieLabels = [], pieData = [], pieColors = [];
    for (let i = d.maxRating; i >= 1; i--) {
        if (overallDist[i] > 0) {
            pieLabels.push(RL[i]);
            pieData.push(overallDist[i]);
            pieColors.push(RC[i]);
        }
    }
    charts.pie = new Chart(document.getElementById('c4'), {
        type: 'doughnut',
        data: { labels: pieLabels, datasets: [{
            data: pieData,
            backgroundColor: pieColors.map(c => c + '99'),
            borderColor: pieColors, borderWidth: 2
        }] },
        options: { ...CHART_OPTS, cutout:'55%',
            plugins: { ...CHART_OPTS.plugins,
                legend: { position:'bottom', labels:{color:'#f1f5f9', padding:12} },
                tooltip: { ...CHART_OPTS.plugins.tooltip,
                    callbacks: { label: ctx => ctx.label + ': ' + ctx.parsed + ' (' + ((ctx.parsed/totalResponses)*100).toFixed(1) + '%)' }
                }
            }
        }
    });

    // 5. Trend line
    if (d.trend && d.trend.length > 1) {
        addChartCard(grid, 'c5', 'fa-timeline', 'Trend IKM per Bulan', true);
        charts.trend = new Chart(document.getElementById('c5'), {
            type: 'line',
            data: {
                labels: d.trend.map(t => t.date),
                datasets: [
                    { label:'IKM', data:d.trend.map(t=>t.ikm), borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,.1)', borderWidth:2, fill:true, tension:.3, pointRadius:4, pointBackgroundColor:'#6366f1' },
                    { label:'Responden', data:d.trend.map(t=>t.count), borderColor:'#f59e0b', borderWidth:2, fill:false, tension:.3, pointRadius:3, yAxisID:'y1' }
                ]
            },
            options: { ...CHART_OPTS,
                scales: {
                    y: { beginAtZero:true, max:d.maxRating+0.5, grid:{color:'#334155'}, ticks:{color:'#94a3b8'}, title:{display:true,text:'IKM',color:'#94a3b8'} },
                    y1: { position:'right', beginAtZero:true, grid:{drawOnChartArea:false}, ticks:{color:'#94a3b8'}, title:{display:true,text:'Responden',color:'#94a3b8'} },
                    x: { grid:{color:'#334155'}, ticks:{color:'#94a3b8'} }
                }
            }
        });
    }

    // 6. Group comparison (per Unit)
    if (Object.keys(d.groupAnalysis).length > 1) {
        const sortedUnits = Object.keys(d.groupAnalysis).sort((a,b) => d.groupAnalysis[b].ikm - d.groupAnalysis[a].ikm);
        const groupValues = sortedUnits.map(u => d.groupAnalysis[u].ikm);
        const groupCounts = sortedUnits.map(u => d.groupAnalysis[u].count);
        const groupColors = groupValues.map(colorByGrade);
        addChartCard(grid, 'c6', 'fa-building', 'Perbandingan IKM per Unit', true);
        charts.grp = new Chart(document.getElementById('c6'), {
            type: 'bar',
            data: { labels: sortedUnits, datasets: [{
                label: 'IKM', data: groupValues,
                backgroundColor: groupColors.map(c => c + '33'),
                borderColor: groupColors, borderWidth: 2, borderRadius: 6
            }] },
            options: { ...CHART_OPTS,
                scales: {
                    y: { beginAtZero:true, max:d.maxRating+0.5, grid:{color:'#334155'}, ticks:{color:'#94a3b8'} },
                    x: { grid:{color:'#334155'}, ticks:{color:'#94a3b8', maxRotation:45} }
                },
                plugins: { ...CHART_OPTS.plugins,
                    tooltip: { ...CHART_OPTS.plugins.tooltip,
                        callbacks: { afterLabel: ctx => 'Responden: ' + groupCounts[ctx.dataIndex] }
                    }
                }
            }
        });
    }
}

/* ===== TABLE ===== */
function renderTable(d) {
    const fa = getFilteredAnalysis(d);
    let html = '<thead><tr><th>No</th><th>Unsur Pelayanan</th><th>NPU</th><th>Skala</th><th>Mutu</th></tr></thead><tbody>';

    d.rCols.forEach((c, i) => {
        const v = fa.npu[c] || 0;
        let grade = 'D';
        for (const [g, range] of Object.entries(SKM_SCALE)) {
            if (v >= range.min && v <= range.max) { grade = g; break; }
        }
        if (v > 4) grade = 'A';
        html += '<tr><td class="n">' + (i+1) + '</td><td>' + escapeHtml(shortName(c)) + '</td>';
        html += '<td class="n" style="font-weight:700;color:' + colorByGrade(v) + '">' + v.toFixed(2) + '</td>';
        html += '<td class="n">1-' + d.maxRating + '</td>';
        html += '<td><span class="qb q' + grade + '">' + grade + ' - ' + (SKM_SCALE[grade]?.label||'Sangat Baik') + '</span></td></tr>';
    });

    html += '<tr style="background:rgba(99,102,241,.1);font-weight:700"><td></td><td>IKM (Indeks Kepuasan Masyarakat)</td>';
    html += '<td class="n" style="font-size:16px">' + fa.ikm.toFixed(2) + '</td>';
    html += '<td class="n">1-' + d.maxRating + '</td>';
    html += '<td><span class="qb q' + fa.qualityGrade + '" style="font-size:13px">' + fa.qualityGrade + ' - ' + (SKM_SCALE[fa.qualityGrade]?.label||'Sangat Baik') + '</span></td></tr></tbody>';

    document.getElementById('tb').innerHTML = html;
}

/* ===== REFRESH ===== */
async function refresh() {
    document.getElementById('ric').classList.add('fa-spin');
    document.getElementById('dot').className = 'dot ld';
    document.getElementById('stxt').textContent = 'Menyinkronkan...';

    try {
        const result = await fetchData();
        pd = analyze(result.data, result.headers);
        currentFilter = 'all';
        render(pd);
    } catch (e) {
        document.getElementById('lo').classList.add('h');
        document.getElementById('mc').style.display = 'none';
        document.getElementById('es').style.display = 'block';
        document.getElementById('em').textContent = e.message;
        document.getElementById('dot').className = 'dot off';
        document.getElementById('stxt').textContent = 'Offline';
        console.error('[SKM] Error:', e);
    }

    document.getElementById('ric').classList.remove('fa-spin');
}

/* ===== INIT ===== */
(async () => {
    try {
        const result = await fetchData();
        pd = analyze(result.data, result.headers);
        render(pd);
    } catch (e) {
        document.getElementById('lo').classList.add('h');
        document.getElementById('es').style.display = 'block';
        document.getElementById('em').textContent = e.message;
        document.getElementById('dot').className = 'dot off';
        document.getElementById('stxt').textContent = 'Offline';
        console.error('[SKM] Init error:', e);
    }
})();
</script>
